server:
  port: 8080
  servlet:
    context-path: /identity

spring:
  application:
    name: identity-service

  datasource:
    url: ${DATASOURCE_URL}
    driverClassName: org.postgresql.Driver
    username: ${USERNAME}
    password: ${PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  signerKey: ${SIGNER_KEY}
  valid-duration: 36000
  refreshable-duration: 120000
app:
  services:
    profile: ${PROFILE_API}